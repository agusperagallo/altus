<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VERTEX — Activar cuenta</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="vertex_login.css">
  <style>
    .step { display:none }
    .step.active { display:block }
    .code-input {
      font-size:22px; letter-spacing:4px; text-align:center;
      font-weight:700; text-transform:uppercase;
    }
    .inst-card {
      background:var(--ice, #F0F4F8); border-radius:10px;
      padding:16px; margin:16px 0; text-align:center;
    }
    .inst-card .name { font-size:18px; font-weight:700; color:var(--navy, #1A1F2E); }
    .inst-card .meta { font-size:12px; color:#6B7280; margin-top:4px; }
    .badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:10px; margin:2px; }
    .success-icon { font-size:48px; text-align:center; margin:16px 0; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">VERTEX</div>
      <div class="login-sub">Cerro Bayo — Villa La Angostura</div>

      <!-- PASO 1: Ingresar código -->
      <div class="step active" id="step-1">
        <h2 style="font-size:16px;font-weight:600;color:var(--navy,#1A1F2E);margin-bottom:6px">Activá tu cuenta</h2>
        <p style="font-size:13px;color:#6B7280;margin-bottom:20px">Ingresá el código que te dio el supervisor para crear tu acceso a VERTEX.</p>
        <div class="form-group">
          <label>Código de invitación</label>
          <input type="text" id="inp-codigo" class="code-input" placeholder="VTX-XXXX-XXXX" maxlength="12" autocomplete="off" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'').replace(/^(.{3})(.{0,4})(.{0,4})$/,(_,a,b,c)=>b?c?a+'-'+b+'-'+c:a+'-'+b:a)">
        </div>
        <div id="step1-error" style="display:none;color:#EF4444;font-size:12px;margin-bottom:10px"></div>
        <button class="login-btn" onclick="verificarCodigo()">Verificar código</button>
      </div>

      <!-- PASO 2: Confirmar datos y crear contraseña -->
      <div class="step" id="step-2">
        <h2 style="font-size:16px;font-weight:600;color:var(--navy,#1A1F2E);margin-bottom:6px">¡Tu código es válido!</h2>
        <p style="font-size:13px;color:#6B7280;margin-bottom:12px">Confirmá tus datos y elegí una contraseña para ingresar.</p>
        <div class="inst-card" id="inst-preview"></div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="inp-email" placeholder="tu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="inp-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>Confirmar contraseña</label>
          <input type="password" id="inp-pass2" placeholder="Repetí la contraseña" autocomplete="new-password">
        </div>
        <div id="step2-error" style="display:none;color:#EF4444;font-size:12px;margin-bottom:10px"></div>
        <button class="login-btn" onclick="crearCuenta()">Crear mi cuenta</button>
        <button onclick="document.getElementById('step-1').classList.add('active');document.getElementById('step-2').classList.remove('active')" style="width:100%;margin-top:8px;background:none;border:none;color:#6B7280;font-size:13px;cursor:pointer;font-family:inherit">← Volver</button>
      </div>

      <!-- PASO 3: Éxito -->
      <div class="step" id="step-3">
        <div class="success-icon">✅</div>
        <h2 style="font-size:18px;font-weight:700;color:var(--navy,#1A1F2E);text-align:center;margin-bottom:8px">¡Cuenta creada!</h2>
        <p style="font-size:13px;color:#6B7280;text-align:center;margin-bottom:20px">Ya podés ingresar a VERTEX con tu email y contraseña.</p>
        <button class="login-btn" onclick="window.location.href='vertex_login.html'">Ir al login</button>
      </div>

    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://pngtxnpywchizyyynuyb.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBuZ3R4bnB5d2NoaXp5eXludXliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk1MjY3MDQsImV4cCI6MjA2NTEwMjcwNH0.B9PEV2IFYIKNMEJ6dJJxTVwgjMMFuHi_MiRLm7abOcg';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    let invitacionId = null;
    let instructorId = null;

    // Leer código de URL si viene como parámetro
    const urlParams = new URLSearchParams(window.location.search);
    const codigoURL = urlParams.get('codigo');
    if (codigoURL) {
      document.getElementById('inp-codigo').value = codigoURL.toUpperCase();
    }

    async function verificarCodigo() {
      const btn = document.querySelector('#step-1 .login-btn');
      const errEl = document.getElementById('step1-error');
      errEl.style.display = 'none';
      const codigo = document.getElementById('inp-codigo').value.trim().toUpperCase();
      if (!codigo || codigo.length < 11) {
        errEl.textContent = 'Ingresá el código completo (VTX-XXXX-XXXX)';
        errEl.style.display = 'block'; return;
      }
      btn.textContent = 'Verificando...'; btn.disabled = true;

      const {data:inv, error} = await sb.from('invitaciones')
        .select('id, usado, instructor_id, instructores(nombre, nivel_certificado, escuelita, activo_cerro, instructor_preferencias(disciplina))')
        .eq('codigo', codigo).maybeSingle();

      btn.textContent = 'Verificar código'; btn.disabled = false;

      if (error || !inv) {
        errEl.textContent = 'Código inválido. Verificá que lo copiaste bien.';
        errEl.style.display = 'block'; return;
      }
      if (inv.usado) {
        errEl.textContent = 'Este código ya fue usado. Contactá al supervisor.';
        errEl.style.display = 'block'; return;
      }

      invitacionId = inv.id;
      instructorId = inv.instructor_id;
      const inst = inv.instructores;
      const discs = [...new Set((inst.instructor_preferencias||[]).map(p=>p.disciplina))].join(' · ') || '—';

      document.getElementById('inst-preview').innerHTML = `
        <div class="name">${inst.nombre}</div>
        <div class="meta">Nivel ${inst.nivel_certificado} · ${discs}</div>
        <div style="margin-top:8px">
          ${inst.activo_cerro!==false?'<span class="badge" style="background:#EEF2FF;color:#3730A3">⛷ Escuela</span>':''}
          ${inst.escuelita?'<span class="badge" style="background:#F0FDF4;color:#166534">🎿 Escuelita</span>':''}
        </div>`;

      document.getElementById('step-1').classList.remove('active');
      document.getElementById('step-2').classList.add('active');
    }

    async function crearCuenta() {
      const btn = document.querySelector('#step-2 .login-btn');
      const errEl = document.getElementById('step2-error');
      errEl.style.display = 'none';

      const email = document.getElementById('inp-email').value.trim();
      const pass  = document.getElementById('inp-pass').value;
      const pass2 = document.getElementById('inp-pass2').value;

      if (!email) { errEl.textContent = 'Ingresá tu email'; errEl.style.display='block'; return; }
      if (!pass || pass.length < 6) { errEl.textContent = 'La contraseña debe tener al menos 6 caracteres'; errEl.style.display='block'; return; }
      if (pass !== pass2) { errEl.textContent = 'Las contraseñas no coinciden'; errEl.style.display='block'; return; }

      btn.textContent = 'Creando cuenta...'; btn.disabled = true;

      // Crear cuenta en auth
      const {data:authData, error:authError} = await sb.auth.signUp({ email, password: pass });
      if (authError) {
        errEl.textContent = authError.message === 'User already registered'
          ? 'Este email ya tiene una cuenta. Usá otro email.'
          : 'Error al crear la cuenta: ' + authError.message;
        errEl.style.display = 'block';
        btn.textContent = 'Crear mi cuenta'; btn.disabled = false;
        return;
      }

      const userId = authData.user?.id;

      // Registrar en tabla usuarios
      await sb.from('usuarios').insert({
        id: userId, email, rol: 'instructor', instructor_id: instructorId
      });

      // Actualizar email en instructores
      await sb.from('instructores').update({ email }).eq('id', instructorId);

      // Marcar invitación como usada
      await sb.from('invitaciones').update({ usado: true, usado_en: new Date().toISOString() }).eq('id', invitacionId);

      // Éxito
      document.getElementById('step-2').classList.remove('active');
      document.getElementById('step-3').classList.add('active');
    }
  </script>
</body>
</html>
