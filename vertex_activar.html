<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VERTEX — Activar cuenta</title>
  <link rel="stylesheet" href="vertex_login.css">
  <style>
    .step { display:none }
    .step.active { display:block }
    .code-input { font-size:22px;letter-spacing:4px;text-align:center;font-weight:700;text-transform:uppercase }
    .inst-card { background:var(--ice,#F0F4F8);border-radius:10px;padding:16px;margin:16px 0;text-align:center }
    .inst-card .iname { font-size:18px;font-weight:700;color:#1A1F2E }
    .inst-card .imeta { font-size:12px;color:#6B7280;margin-top:4px }
    .badge { display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;margin:2px }
    .err { color:#EF4444;font-size:12px;margin-bottom:10px;display:none }
    .success-icon { font-size:48px;text-align:center;margin:16px 0 }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">VERTEX</div>
      <div class="login-sub">Cerro Bayo — Villa La Angostura</div>

      <div class="step active" id="step-1">
        <h2 style="font-size:16px;font-weight:600;color:#1A1F2E;margin-bottom:6px">Activá tu cuenta</h2>
        <p style="font-size:13px;color:#6B7280;margin-bottom:20px">Ingresá el código que te dio el supervisor.</p>
        <div class="form-group">
          <label>Código de invitación</label>
          <input type="text" id="inp-codigo" class="code-input" placeholder="VTX-XXXX-XXXX" maxlength="12" autocomplete="off"
            oninput="formatCodigo(this)">
        </div>
        <div class="err" id="err1"></div>
        <button class="login-btn" onclick="verificarCodigo()">Verificar código</button>
      </div>

      <div class="step" id="step-2">
        <h2 style="font-size:16px;font-weight:600;color:#1A1F2E;margin-bottom:6px">¡Código válido!</h2>
        <p style="font-size:13px;color:#6B7280;margin-bottom:12px">Completá tus datos para crear tu acceso.</p>
        <div class="inst-card" id="inst-preview"></div>
        <div class="form-group"><label>Email</label><input type="email" id="inp-email" placeholder="tu@email.com"></div>
        <div class="form-group"><label>Contraseña</label><input type="password" id="inp-pass" placeholder="Mínimo 6 caracteres"></div>
        <div class="form-group"><label>Confirmar contraseña</label><input type="password" id="inp-pass2" placeholder="Repetí la contraseña"></div>
        <div class="err" id="err2"></div>
        <button class="login-btn" onclick="crearCuenta()">Crear mi cuenta</button>
        <button onclick="goStep(1)" style="width:100%;margin-top:8px;background:none;border:none;color:#6B7280;font-size:13px;cursor:pointer;font-family:inherit">← Volver</button>
      </div>

      <div class="step" id="step-3">
        <div class="success-icon">✅</div>
        <h2 style="font-size:18px;font-weight:700;color:#1A1F2E;text-align:center;margin-bottom:8px">¡Cuenta creada!</h2>
        <p style="font-size:13px;color:#6B7280;text-align:center;margin-bottom:20px">Ya podés ingresar con tu email y contraseña.</p>
        <button class="login-btn" onclick="window.location.href='vertex_login.html'">Ir al login</button>
      </div>
    </div>
  </div>

  <script>
    // Desregistrar SW — no debe interferir con esta página
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(r => r.forEach(sw => sw.unregister()));
    }

    const SB_URL  = 'https://pngtxnpywchizyyynuyb.supabase.co';
    const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBuZ3R4bnB5d2NoaXp5eXludXliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk1MjY3MDQsImV4cCI6MjA2NTEwMjcwNH0.B9PEV2IFYIKNMEJ6dJJxTVwgjMMFuHi_MiRLm7abOcg';

    const headers = { 'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON, 'Content-Type': 'application/json' };

    async function sbGet(path) {
      const r = await fetch(SB_URL + '/rest/v1/' + path, { headers });
      return r.ok ? r.json() : null;
    }
    async function sbPost(path, body, extraHeaders) {
      const r = await fetch(SB_URL + '/rest/v1/' + path, {
        method: 'POST', headers: { ...headers, ...extraHeaders }, body: JSON.stringify(body)
      });
      return { ok: r.ok, data: r.ok ? await r.json() : null, error: !r.ok ? await r.json() : null };
    }
    async function sbPatch(path, body) {
      const r = await fetch(SB_URL + '/rest/v1/' + path, {
        method: 'PATCH', headers, body: JSON.stringify(body)
      });
      return r.ok;
    }

    let invData = null;

    function goStep(n) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step-' + n).classList.add('active');
    }

    function formatCodigo(el) {
      let v = el.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
      if (v.length > 3) v = v.slice(0,3) + '-' + v.slice(3);
      if (v.length > 8) v = v.slice(0,8) + '-' + v.slice(8);
      el.value = v.slice(0,12);
    }

    // Autocompletar desde URL
    const urlCodigo = new URLSearchParams(location.search).get('codigo');
    if (urlCodigo) document.getElementById('inp-codigo').value = urlCodigo.toUpperCase();

    async function verificarCodigo() {
      const btn = document.querySelector('#step-1 .login-btn');
      const err = document.getElementById('err1');
      err.style.display = 'none';
      const codigo = document.getElementById('inp-codigo').value.trim().toUpperCase();
      if (codigo.length < 11) { err.textContent = 'Ingresá el código completo'; err.style.display='block'; return; }

      btn.textContent = 'Verificando...'; btn.disabled = true;

      const data = await sbGet('invitaciones?select=id,usado,instructor_id,instructores(nombre,nivel_certificado,escuelita,activo_cerro,instructor_preferencias(disciplina))&codigo=eq.' + codigo);

      btn.textContent = 'Verificar código'; btn.disabled = false;

      if (!data || !data.length) { err.textContent = 'Código inválido. Verificá que lo copiaste bien.'; err.style.display='block'; return; }
      if (data[0].usado) { err.textContent = 'Este código ya fue usado. Contactá al supervisor.'; err.style.display='block'; return; }

      invData = data[0];
      const inst = invData.instructores;
      const discs = [...new Set((inst.instructor_preferencias||[]).map(p=>p.disciplina))].join(' · ') || '—';

      document.getElementById('inst-preview').innerHTML =
        '<div class="iname">' + inst.nombre + '</div>' +
        '<div class="imeta">Nivel ' + inst.nivel_certificado + ' · ' + discs + '</div>' +
        '<div style="margin-top:8px">' +
        (inst.activo_cerro!==false ? '<span class="badge" style="background:#EEF2FF;color:#3730A3">⛷ Escuela</span>' : '') +
        (inst.escuelita ? '<span class="badge" style="background:#F0FDF4;color:#166534">🎿 Escuelita</span>' : '') +
        '</div>';

      goStep(2);
    }

    async function crearCuenta() {
      const btn = document.querySelector('#step-2 .login-btn');
      const err = document.getElementById('err2');
      err.style.display = 'none';

      const email = document.getElementById('inp-email').value.trim();
      const pass  = document.getElementById('inp-pass').value;
      const pass2 = document.getElementById('inp-pass2').value;

      if (!email) { err.textContent = 'Ingresá tu email'; err.style.display='block'; return; }
      if (pass.length < 6) { err.textContent = 'La contraseña debe tener al menos 6 caracteres'; err.style.display='block'; return; }
      if (pass !== pass2) { err.textContent = 'Las contraseñas no coinciden'; err.style.display='block'; return; }

      btn.textContent = 'Creando cuenta...'; btn.disabled = true;

      // Crear usuario en auth
      const authRes = await fetch(SB_URL + '/auth/v1/signup', {
        method: 'POST',
        headers: { 'apikey': SB_ANON, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass })
      });
      const authData = await authRes.json();

      if (!authRes.ok || !authData.user?.id) {
        err.textContent = authData.error_description || authData.msg || 'Error al crear la cuenta';
        err.style.display = 'block';
        btn.textContent = 'Crear mi cuenta'; btn.disabled = false;
        return;
      }

      const userId = authData.user.id;
      const userToken = authData.access_token;
      const authHeaders = { 'apikey': SB_ANON, 'Authorization': 'Bearer ' + userToken, 'Content-Type': 'application/json' };

      // Insertar en usuarios
      await fetch(SB_URL + '/rest/v1/usuarios', {
        method: 'POST',
        headers: { ...authHeaders, 'Prefer': 'return=minimal' },
        body: JSON.stringify({ id: userId, email, rol: 'instructor', instructor_id: invData.instructor_id })
      });

      // Actualizar email en instructores
      await fetch(SB_URL + '/rest/v1/instructores?id=eq.' + invData.instructor_id, {
        method: 'PATCH', headers: { ...authHeaders, 'Prefer': 'return=minimal' },
        body: JSON.stringify({ email })
      });

      // Marcar invitación como usada
      await fetch(SB_URL + '/rest/v1/invitaciones?id=eq.' + invData.id, {
        method: 'PATCH', headers: { ...authHeaders, 'Prefer': 'return=minimal' },
        body: JSON.stringify({ usado: true, usado_en: new Date().toISOString() })
      });

      goStep(3);
    }
  </script>
</body>
</html>
