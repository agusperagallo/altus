<!DOCTYPE html>
<html lang="es">
<head>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertex — Ingresar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="vertex_login.css">
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-name">VERTEX</div>
    <div class="brand-sub">Cerro Bayo &mdash; Villa La Angostura</div>
  </div>
  <hr class="divider">

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="correo@ejemplo.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') login()">
  </div>

  <button class="btn-login" id="btn-login" onclick="login()">
    <span id="btn-text">Ingresar</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <div class="error-msg" id="error-msg"></div>

  <div class="footer-txt">Sistema interno &mdash; Temporada 2026</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://pngtxnpywchizyyynuyb.supabase.co',
    'sb_publishable_-TBqMvOtGY0CPamchZN_jA_vPYl4f5-'
  );

  async function login() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btn-login');
    const spinner  = document.getElementById('spinner');
    const btnText  = document.getElementById('btn-text');
    const errorMsg = document.getElementById('error-msg');

    if (!email || !password) {
      mostrarError('Ingresá tu email y contraseña');
      return;
    }

    // Loading state
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Ingresando...';
    errorMsg.style.display = 'none';

    // Login con Supabase Auth
    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      mostrarError('Email o contraseña incorrectos');
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = 'Ingresar';
      return;
    }

    // Obtener rol del usuario
    const { data: usuario } = await sb
      .from('usuarios')
      .select('rol, instructor_id')
      .eq('id', data.user.id)
      .single();

    if (!usuario) {
      mostrarError('Usuario sin rol asignado. Contactá al administrador.');
      await sb.auth.signOut();
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = 'Ingresar';
      return;
    }

    // Guardar sesión en localStorage
    localStorage.setItem('vertex_rol', usuario.rol);
    localStorage.setItem('vertex_user_id', data.user.id);
    localStorage.setItem('vertex_email', email);
    if (usuario.instructor_id) {
      localStorage.setItem('vertex_instructor_id', usuario.instructor_id);
    }

    // Redirigir según rol
    if (usuario.rol === 'instructor') {
      window.location.href = 'vertex_instructor.html';
    } else {
      window.location.href = 'vertex_panel.html';
    }
  }

  function mostrarError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // Si ya hay sesión activa, redirigir directamente
  sb.auth.getSession().then(({ data }) => {
    if (data?.session) {
      const rol = localStorage.getItem('vertex_rol');
      if (rol === 'instructor') {
        window.location.href = 'vertex_instructor.html';
      } else if (rol) {
        window.location.href = 'vertex_panel.html';
      }
    }
  });
</script>
</body>
</html>
